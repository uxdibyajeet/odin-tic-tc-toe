<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <div id="main">
      <h1>tic-tac-toe</h1>
      <!-- start of game -->
      <div class="start-game hidden">
        <div class="card-container">
          <div id="firstPlayer" class="card">
            <h1 class="hero">X</h1>
            <p>Goes First</p>
            <input type="text" placeholder="name eg. Xavier" />
          </div>
          <div id="SecondPlayer" class="card">
            <h1 class="hero">O</h1>
            <p>Goes Second</p>
            <input type="text" placeholder="name eg. Olivia" />
          </div>
        </div>
        <button class="cta" id="startGame">Play</button>
      </div>
      <!-- game over -->
      <div class="game-over hidden">
        <h3 id="game-over-msg">message goes here</h3>
        <button class="cta" id="restart">Restart</button>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
